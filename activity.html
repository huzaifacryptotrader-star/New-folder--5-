<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Doctor Appointment</h1>
    <p>Welcome to the doctor appointment scheduling page. Please fill out the form below to book your appointment.</p>
    <hr>
   
    <form>
        <fieldset>
            <legend>Appointment Details</legend>
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="date">Preferred Date:</label><br>
        <input type="date" id="date" name="date" required><br><br>

        <label for="time">Preferred Time:</label><br>
        <input type="time" id="time" name="time" required><br><br>
        
        <label for="phone number">Phone Number:</label><br>
        <input type="tel" id="phone number" name="phone number" required><br><br>


</fieldset>

<br>

<fieldset>
    <legend>Doctor Information</legend>
    <label for="doctor">Preferred Doctor:</label><br>
    <select id="doctor" name="doctor" >
        <option value="">Select a doctor</option>
        <option value="dr_smith">Dr. Smith</option>
        <option value="dr_jones">Dr. Jones</option>
        <option value="dr_brown">Dr. Brown</option>
    </select><br><br>


<br>


    <legend>Anything You Want to Add</legend>
    <label for="notes">Notes:</label><br>
    <textarea id="notes" name="notes" rows="4" cols="50"></textarea><br><br>

   
        <legend>Submit Your Appointment</legend>
        <input type="radio" id="confirm" name="confirm" value="confirm" required> <label for="confirm">Confirm Appointment</label><br>
        <input type="radio" id="cancel" name="confirm" value="cancel" required> <label for="cancel">Cancel Appointment</label><br>

        <br>


        <legend>How is the response?</legend><br>
        <input type="checkbox" id="" name="" value="confirm"   for="confirm">good</label><br>
        <input type="checkbox" id="" name="" value="cancel"   for="cancel">not good</label><br>



 </fieldset>

 <br>
 
 <input type="submit" value="Submit">
</form>

</body>
</html>
